<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEFI Academic Core | CBE Mathematics Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --kenya-black: #0A0A0A;
            --kenya-red: #BB0000;
            --kenya-green: #008751;
            --white: #ffffff;
            --bg-obsidian: #0D0F12;
            --off-white: #F4F6F8;
            --border-color: #E2E8F0;
            --text-dark: #1E293B;
            --muted-gray: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--off-white); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }

        /* --- LEFT NAVIGATION: CURRICULUM DIRECTORY --- */
        .curriculum-sidebar {
            width: 320px;
            background: var(--white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 2px solid var(--off-white);
            background: var(--white);
        }

        /* Nav Tab Link Back to Dashboard */
        .back-courses-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--muted-gray);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 4px 0;
            margin-bottom: 0.75rem;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        .back-courses-link:hover {
            color: var(--kenya-red);
        }

        .sidebar-header h2 {
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--kenya-black);
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--muted-gray);
            margin-top: 2px;
        }

        .topic-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .strand-group {
            margin-bottom: 1.5rem;
        }

        .strand-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--kenya-red);
            padding-left: 0.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .topic-btn {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            text-align: left;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
            transition: all 0.2s ease;
            margin-bottom: 0.25rem;
        }

        .topic-btn:hover {
            background: var(--off-white);
            color: var(--kenya-black);
        }

        .topic-btn.active-topic {
            background: rgba(0, 135, 81, 0.08);
            color: var(--kenya-green);
            border-color: rgba(0, 135, 81, 0.2);
            font-weight: 700;
        }

        /* --- MAIN WORKSPACE (CENTER) --- */
        main {
            flex: 1;
            padding: 2.5rem 3%;
            overflow-y: auto;
            height: 100vh;
        }

        .curriculum-tag { 
            font-family: 'JetBrains Mono', monospace; 
            color: var(--kenya-red); 
            font-weight: 700; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        h1 { font-size: 2.2rem; font-weight: 900; margin-top: 0.25rem; margin-bottom: 1.5rem; color: var(--kenya-black); letter-spacing: -0.5px; }
        
        /* Video Container */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); margin-bottom: 2rem; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Infrastructure / Resource Inventory Panel */
        .resource-panel {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }
        .resource-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--muted-gray);
            margin-bottom: 0.5rem;
        }
        .resource-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .res-tag {
            font-size: 0.75rem;
            background: var(--off-white);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            color: #475569;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Quiz Component */
        .quiz-container { background: var(--white); border-left: 5px solid var(--kenya-green); padding: 2rem; border-radius: 0 6px 6px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.01); margin-bottom: 2rem; }
        .quiz-container h2 { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; margin-bottom: 1rem; color: var(--kenya-black); }
        .math-expr { background: var(--off-white); padding: 1.25rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 1.05rem; margin-bottom: 1.5rem; border: 1px solid var(--border-color); color: #0f172a; line-height: 1.5; }
        .options-grid { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1.5rem; }
        .option-btn { background: var(--white); border: 1px solid #cbd5e1; padding: 1rem; text-align: left; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s; color: #334155; }
        .option-btn:hover { border-color: var(--kenya-green); background: var(--off-white); }
        .option-btn.selected { border-color: var(--kenya-green); background: rgba(0, 135, 81, 0.04); }
        .action-bar { display: flex; gap: 1rem; }
        .btn { padding: 0.8rem 1.5rem; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        .btn-submit { background: var(--kenya-black); color: var(--white); }
        .btn-hint { background: #cbd5e1; color: var(--text-dark); }

        /* --- PROFESSOR ONEIRO SIDEBAR (RIGHT) --- */
        aside { width: 360px; background: var(--bg-obsidian); color: var(--white); position: relative; height: 100vh; display: flex; flex-direction: column; border-left: 4px solid var(--kenya-green); }
        .prof-header { padding: 1.5rem; border-bottom: 1px solid #1e293b; background: #090b0d; }
        .prof-title { font-family: 'JetBrains Mono', monospace; color: var(--kenya-green); font-weight: 900; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .prof-status { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .chat-space { flex: 1; padding: 1.25rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; font-size: 0.85rem; }
        .msg { padding: 0.9rem; border-radius: 6px; max-width: 88%; line-height: 1.4; }
        .msg.oneiro { background: rgba(0, 135, 81, 0.08); border: 1px solid rgba(0, 135, 81, 0.2); color: #e2e8f0; align-self: flex-start; }
        .msg.student { background: #1e293b; color: var(--white); align-self: flex-end; }
        .chat-input-area { padding: 1.25rem; background: #090b0d; border-top: 1px solid #1e293b; display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #1e293b; border: 1px solid #334155; padding: 0.8rem; border-radius: 4px; color: var(--white); font-size: 0.85rem; }
        .chat-input:focus { outline: none; border-color: var(--kenya-green); }
        .btn-send { background: var(--kenya-green); border: none; padding: 0 1.2rem; border-radius: 4px; cursor: pointer; color: white; font-weight: 900; }

        @media (max-width: 1200px) {
            .curriculum-sidebar { width: 260px; }
            aside { width: 320px; }
        }
    </style>
</head>
<body>

    <div class="curriculum-sidebar">
        <div class="sidebar-header">
            <a href="courses.html" class="back-courses-link">← Back to Courses</a>
            <h2 id="sidebarTitle">Grade Math Pod</h2>
            <p id="sidebarSubtitle">CBE Appendix Node</p>
        </div>
        <div class="topic-scroll" id="topicDirectory">
            </div>
    </div>

    <main>
        <span class="curriculum-tag" id="strandLabel">Loading Strand Engine...</span>
        <h1 id="topicTitle">Dynamic Syllabus Target</h1>
        
        <div class="video-wrapper">
            <iframe id="videoPlayer" src="" allowfullscreen></iframe>
        </div>

        <div class="resource-panel">
            <div class="resource-title">Required Structural & Material Resources</div>
            <div class="resource-tags" id="resourceContainer">
                </div>
        </div>

        <div class="quiz-container">
            <h2 id="matrixTaskLabel">Active Evaluation Matrix // Task 01</h2>
            <div class="math-expr" id="problemExpression">
                Loading targeted logical vector expansion formula...
            </div>
            <div class="options-grid" id="optionsGrid">
                </div>
            <div class="action-bar">
                <button class="btn btn-submit" onclick="evaluateAnswer()">Validate Vector</button>
                <button class="btn btn-hint" onclick="summonOneiroHint()">Query Professor Oneiro</button>
            </div>
        </div>
    </main>

    <aside>
        <div class="prof-header">
            <div class="prof-title">
                <span style="color: var(--kenya-red);">●</span> PROFESSOR_ONEIRO_v1.0
            </div>
            <div class="prof-status">Cognitive Assistance Engine // Online</div>
        </div>
        
        <div class="chat-space" id="chatSpace">
            </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="studentInput" placeholder="Query analytical step matrix parameters...">
            <button class="btn-send" onclick="sendStudentMessage()">→</button>
        </div>
    </aside>

    <script>
        // Core Curriculum Database mapping both Grade 10 and Grade 11 variations
        const curriculumDatabase = [
            // --- GRADE 10 ESSENTIAL MATH ---
            { id: "g10-est", grade: "10", type: "essential", strand: "Arithmetic & Context", subStrand: "Estimation & Rounding", resources: ["Calculators", "Digital Logsheets", "Workbooks"], videoUrl: "https://www.youtube.com/embed/Szk_f8vU_LI", problem: "Estimate the value of 5.87 × 19.3 by rounding each term to 1 significant figure.", options: ["100", "120", "60", "200"], correctIndex: 1, hint: "Round 5.87 to 6 and 19.3 to 20, then evaluate." },
            { id: "g10-conv", grade: "10", type: "essential", strand: "Measurement Logic", subStrand: "Metric Conversions", resources: ["Metric Rulers", "Conversion Matrices"], videoUrl: "https://www.youtube.com/embed/Szk_f8vU_LI", problem: "Convert 4.25 kilometers into standard meters.", options: ["425 m", "4,250 m", "42,500 m", "42.5 m"], correctIndex: 1, hint: "Recall that 1 kilometer maps directly to 1,000 meters." },
            { id: "g10-scale", grade: "10", type: "essential", strand: "Applied Geometry", subStrand: "Scale Drawings", resources: ["Graph Paper", "Protractors"], videoUrl: "https://www.youtube.com/embed/Szk_f8vU_LI", problem: "If a map scale is 1:50,000, what actual distance corresponds to 2 cm on the map?", options: ["1 km", "5 km", "10 km", "0.5 km"], correctIndex: 0, hint: "Multiply 2 by 50,000 cm, then map the centimeter output to kilometers." },

            // --- GRADE 10 CORE MATH ---
            { 
                id: "g10-alg", 
                grade: "10", 
                type: "core", 
                strand: "Pure Algebra", 
                subStrand: "Exponents & Algebra", 
                resources: ["Formula Arrays", "Scientific Device"], 
                videoUrl: "https://www.youtube.com/embed/LkhPRz7Hocg", 
                problem: "Simplify the structural algebraic expression: (x³ × x⁵) / x²", 
                options: ["x⁶", "x¹⁰", "x⁴", "x¹"], 
                correctIndex: 0, 
                hint: "Apply linear exponent law: add indices on multiplication, subtract on division." 
            },
            { 
                id: "g10-sim", 
                grade: "10", 
                type: "core", 
                strand: "Linear Networks", 
                subStrand: "Simultaneous Equations", 
                resources: ["System Plotters", "Matrices Workspace"], 
                videoUrl: "https://www.youtube.com/embed/oKqtgz2eo-Y", 
                problem: "Solve for variables: x + y = 12 and x - y = 4.", 
                options: ["(8, 4)", "(7, 5)", "(9, 3)", "(6, 2)"], 
                correctIndex: 0, 
                hint: "Sum the equation vectors together to isolate and eliminate the y parameter." 
            },

            // --- GRADE 11 ESSENTIAL MATH ---
            { id: "g11-fin", grade: "11", type: "essential", strand: "Applied Finance", subStrand: "Finance & Tax", resources: ["Tax Charts", "Spreadsheets"], videoUrl: "https://www.youtube.com/embed/Szk_f8vU_LI", problem: "Calculate the net profit index on a gross volume of 45,000 KES subject to a 15% flat deduction rate.", options: ["38,250 KES", "35,000 KES", "40,000 KES", "37,500 KES"], correctIndex: 0, hint: "Deduct 0.15 × 45,000 from the baseline system volume." },

            // --- GRADE 11 CORE MATH ---
            { id: "g11-trig", grade: "11", type: "core", strand: "Analytical Geometry", subStrand: "Trigonometric Identities", resources: ["Trig Tables", "Calculators"], videoUrl: "https://www.youtube.com/embed/Szk_f8vU_LI", problem: "Simplify the fundamental structure expression: sin²(θ) + cos²(θ)", options: ["0", "1", "tan²(θ)", "2"], correctIndex: 1, hint: "This identity represents the unitary value circle radius vector." }
        ];

        let selectedAnswerIndex = null;
        let activeTopic = null;

        // Routing Engine Initialization
        function initRouting() {
            const urlParams = new URLSearchParams(window.location.search);
            const activeGrade = urlParams.get('grade') || '10';
            const activeType = urlParams.get('type') || 'core';

            // Filter relevant items
            const localizedSyllabus = curriculumDatabase.filter(item => item.grade === activeGrade && item.type === activeType);

            // Interface Content Adjustments
            const headerTitle = `Grade ${activeGrade} ${activeType.charAt(0).toUpperCase() + activeType.slice(1)} Math`;
            document.getElementById('sidebarTitle').innerText = headerTitle;
            document.getElementById('sidebarSubtitle').innerText = `Active Pipeline Node: L${activeGrade}`;

            const directoryContainer = document.getElementById('topicDirectory');
            directoryContainer.innerHTML = '';

            if(localizedSyllabus.length === 0) {
                directoryContainer.innerHTML = '<p style="padding:1rem; font-size:0.8rem; color:var(--muted-gray);">No specific system records found.</p>';
                return;
            }

            // Render topics sequentially
            let currentStrand = "";
            let groupDiv = null;

            localizedSyllabus.forEach((item, index) => {
                if (item.strand !== currentStrand) {
                    currentStrand = item.strand;
                    groupDiv = document.createElement('div');
                    groupDiv.className = 'strand-group';
                    
                    const title = document.createElement('div');
                    title.className = 'strand-title';
                    title.innerText = currentStrand;
                    groupDiv.appendChild(title);
                    directoryContainer.appendChild(groupDiv);
                }

                const button = document.createElement('button');
                button.className = `topic-btn ${index === 0 ? 'active-topic' : ''}`;
                button.innerText = item.subStrand;
                button.onclick = (e) => loadWorkspaceTopic(item, e.currentTarget);
                
                if(groupDiv) groupDiv.appendChild(button);
            });

            // Auto-load Initial Dataset Node
            loadWorkspaceTopic(localizedSyllabus[0]);
            initOneiroGreeting(headerTitle);
        }

        // Workspace Presentation Modifier
        function loadWorkspaceTopic(topic, elementNode = null) {
            if(!topic) return;
            activeTopic = topic;
            selectedAnswerIndex = null;

            if(elementNode) {
                document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active-topic'));
                elementNode.classList.add('active-topic');
            }

            // Load textual information
            document.getElementById('strandLabel').innerText = topic.strand;
            document.getElementById('topicTitle').innerText = topic.subStrand;
            document.getElementById('videoPlayer').src = topic.videoUrl;

            // Load structural resources 
            const resourceBox = document.getElementById('resourceContainer');
            resourceBox.innerHTML = '';
            topic.resources.forEach(res => {
                const tag = document.createElement('span');
                tag.className = 'res-tag';
                tag.innerText = res;
                resourceBox.appendChild(tag);
            });

            // Load active matrix metrics
            document.getElementById('problemExpression').innerText = topic.problem;
            const optionsBox = document.getElementById('optionsGrid');
            optionsBox.innerHTML = '';
            
            topic.options.forEach((opt, idx) => {
                const optBtn = document.createElement('button');
                optBtn.className = 'option-btn';
                optBtn.innerText = opt;
                optBtn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    optBtn.classList.add('selected');
                    selectedAnswerIndex = idx;
                };
                optionsBox.appendChild(optBtn);
            });
        }

        // Answer evaluation matrix parameters
        function evaluateAnswer() {
            if(selectedAnswerIndex === null) {
                alert("Please select a transformation logic matrix option before running analysis.");
                return;
            }
            if(selectedAnswerIndex === activeTopic.correctIndex) {
                appendChatMessage("System Diagnostic", "Vector verification positive. Formula solution matches parameters.", "oneiro");
                alert("Correct! Mathematical logic confirmed.");
            } else {
                appendChatMessage("System Diagnostic", "Vector mapping discrepancy detected. Review the hint profile.", "oneiro");
                alert("Incorrect logical path. Query Professor Oneiro for details.");
            }
        }

        // AI Cognitive Chat Interfaces
        function initOneiroGreeting(courseName) {
            const workspace = document.getElementById('chatSpace');
            workspace.innerHTML = '';
            appendChatMessage("PROF. ONEIRO", `Welcome to the ${courseName} engineering workspace portal. Input queries regarding steps, formulas, or algorithmic pathways below.`, "oneiro");
        }

        function summonOneiroHint() {
            if(activeTopic) {
                appendChatMessage("PROF. ONEIRO", `Evaluation Hint: ${activeTopic.hint}`, "oneiro");
            }
        }

        function sendStudentMessage() {
            const inputField = document.getElementById('studentInput');
            const userMsg = inputField.value.trim();
            if(!userMsg) return;

            appendChatMessage("LEARNER", userMsg, "student");
            inputField.value = '';

            // Simulated Expert Logic Response Process
            setTimeout(() => {
                appendChatMessage("PROF. ONEIRO", "Query logged into processing engine. Reviewing current matrix step values against system standards...", "oneiro");
            }, 700);
        }

        function appendChatMessage(sender, bodyText, originClass) {
            const chatBox = document.getElementById('chatSpace');
            const container = document.createElement('div');
            container.className = `msg ${originClass}`;
            container.innerHTML = `<strong>${sender}:</strong> ${bodyText}`;
            chatBox.appendChild(container);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Boot sequence trigger
        window.onload = initRouting;
    </script>
</body>
</html>
