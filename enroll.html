<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Admissions | UEFI Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Bebas+Neue&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ke-black: #0a0a0a;
            --ke-red: #9e0b0f;      
            --ke-green: #006633;    
            --ke-white: #ffffff;
            --ke-gold: #d4af37;     
            --text-muted: #64748b;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--ke-white);
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* --- FLAG IDENTITY BAR --- */
        .national-bar {
            position: fixed;
            top: 0; width: 100%; height: 6px;
            display: flex; z-index: 2000;
        }
        .bar-black { flex: 1; background: var(--ke-black); }
        .bar-red { flex: 1; background: var(--ke-red); }
        .bar-green { flex: 1; background: var(--ke-green); }

        /* --- RECONCILED NAVIGATION --- */
        header {
            position: fixed;
            top: 6px; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 2px solid var(--slate-200);
        }

        header nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0.5rem 5%;
            height: 70px;
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
        }
        
        .logo img { 
            height: 32px; 
            width: auto; 
            object-fit: contain; 
            display: block; 
        }
        
        .logo span { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: 800; 
            font-size: 0.85rem; 
            letter-spacing: 1px; 
            color: var(--ke-black); 
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 5px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--ke-black);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            display: inline-block;
        }

        .nav-links a:hover:not(.btn-nav):not(.btn-scholarship) { 
            background: var(--slate-100); 
        }

        /* Context-aware current page marker or distinct nav button button style */
        .btn-nav {
            border: 2px solid var(--ke-black);
            background: var(--ke-black);
            color: var(--ke-white) !important;
        }

        /* High-visibility Gold Scholarship Button */
        .btn-scholarship {
            background: var(--ke-gold);
            color: var(--ke-black) !important;
            font-weight: 800 !important;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }

        .btn-scholarship:hover {
            background: var(--ke-black);
            color: var(--ke-white) !important;
            transform: translateY(-2px);
        }

        /* --- LAYOUT --- */
        .main-wrapper { display: flex; min-height: 100vh; }

        .sidebar {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 100px 6%;
            color: white;
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.3);
        }

        .overlay-gradient {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--ke-black) 30%, transparent 100%);
            z-index: -1;
        }

        .hero-content h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 6rem;
            line-height: 0.9;
            margin-bottom: 25px;
        }

        /* --- STAT CARDS --- */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            border-left: 4px solid var(--ke-green);
            border-radius: 4px;
            min-width: 160px;
        }

        .stat-card strong {
            display: block;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--ke-white);
            letter-spacing: 1px;
        }

        .stat-card span {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--ke-gold);
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        /* --- FORM SIDE --- */
        .form-side { flex: 1.2; padding: 160px 10% 80px; }
        .section-tag { color: var(--ke-green); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .form-header h2 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 40px; }

        .enroll-form { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .full { grid-column: span 2; }

        .input-group label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--ke-black); margin-bottom: 8px; display: block; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 18px; border: 2px solid #f1f5f9; background: #f8fafc; font-family: inherit; font-size: 1rem;
        }

        .input-group input:focus { outline: none; border-color: var(--ke-green); background: white; }

        .btn-submit {
            grid-column: span 2;
            background: var(--ke-green);
            color: white;
            padding: 24px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover { background: var(--ke-black); transform: translateY(-3px); }

        @media (max-width: 1100px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { min-height: 50vh; padding: 60px 6%; }
            .hero-content h1 { font-size: 4rem; }
            .stats-container { flex-wrap: wrap; }
            .nav-links { display: none; } /* Mobile structural fallback if standard menu hits small breaks */
        }
    </style>
</head>
<body>

    <div class="national-bar">
        <div class="bar-black"></div>
        <div class="bar-red"></div>
        <div class="bar-green"></div>
    </div>

    <header>
        <nav>
            <a href="index.html" class="logo">
               <img src="assets/logo-uefi.png" alt="U.E.F.I. Logo">
               <span>U.E.F.I. INSTITUTE</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="abouts.html">About</a></li>
                <li><a href="tech-lab.html">Tech Lab</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="opportunities-hub.html#national">National</a></li>
                <li><a href="opportunities-hub.html#continental">Continental</a></li>
                <li><a href="opportunities-hub.html#extra-continental">Global</a></li>
                <li><a href="opportunities-hub.html#scholarships" class="btn-scholarship">Scholarships</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-wrapper">
        <aside class="sidebar">
            <video autoplay muted loop playsinline class="video-bg">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-modern-university-campus-building-exterior-4330-large.mp4" type="video/mp4">
            </video>
            <div class="overlay-gradient"></div>

            <div class="hero-content">
                <h1>Architecting<br>African<br>Excellence.</h1>
                
                <div class="stats-container">
                    <div class="stat-card">
                        <strong>ISO-27001</strong>
                        <span>Secure Portal</span>
                    </div>
                    <div class="stat-card">
                        <strong>98%</strong>
                        <span>Placement Rate</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="form-side">
            <span class="section-tag">Direct Enrollment</span>
            <div class="form-header">
                <h2>Candidate Portfolio</h2>
            </div>

            <form action="https://formspree.io/f/xnjoplag" method="POST" class="enroll-form">
                
                <div class="input-group full">
                    <label>Full Name</label>
                    <input type="text" name="FullName" placeholder="e.g. Maria Leshau" required>
                </div>

                <div class="input-group full">
                    <label>Professional Email</label>
                    <input type="email" name="Email" placeholder="m.leshau@uefi.org" required>
                </div>

                <div class="input-group">
                    <label>Origin / Residency</label>
                    <select name="Location" required>
                        <option value="" disabled selected>Select Origin</option>
                        <option>Narok</option>
                        <option>Other part of Kenya</option>
                        <option>International</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Academy Track</label>
                    <select name="Track" required>
                        <option>Quant Finance & Algos</option>
                        <option>Applied Artificial Intelligence</option>
                        <option>Anthoninah (Women in Tech)</option>
                        <option>Wilson (Executive Excellence)</option>
                    </select>
                </div>

                <div class="input-group full">
                    <label>Statement of Intent</label>
                    <textarea name="Vision" rows="4" placeholder="Briefly describe your goals..."></textarea>
                </div>

                <input type="hidden" name="_subject" value="GLOBAL ADMISSION: UEFI 2026">
                <button type="submit" class="btn-submit">Submit Formal Application</button>
            </form>
        </main>
    </div>

</body>
</html>
