<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Directory | National UEFI Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* High-End Solid Technical Palette */
            --navy-deep: #020617;
            --navy-surface: #0f172a;
            --accent-gold: #fbbf24;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-800: #1e293b;
            --white: #ffffff;
            
            /* Tier Colors - Solid & High Contrast */
            --public-clr: #2563eb; 
            --private-clr: #e11d48;
            --tvet-clr: #059669; 
            --external-clr: #7c3aed; 
            --continental-clr: #ea580c; 
            --scholarship-clr: #d97706; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--slate-100); 
            color: var(--navy-deep); 
            line-height: 1.6;
        }

        /* Solid National Identity Strip */
        .national-accent {
            height: 6px;
            width: 100%;
            background: #000; 
            background: linear-gradient(90deg, 
                #000 0% 25%, 
                #BB0000 25% 50%, 
                #006600 50% 75%, 
                #fff 75% 100%);
            position: fixed;
            top: 0;
            z-index: 2000;
        }

        /* Reconciled & Upgraded Navigation Styling */
        header {
            background: var(--white);
            position: sticky;
            top: 6px;
            z-index: 1000;
            border-bottom: 2px solid var(--slate-200);
        }

        header nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            height: 70px;
        }

        .logo { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
        }
        
        .logo img { 
            height: 32px; 
            width: auto; 
            object-fit: contain; 
            display: block; 
        }
        
        .logo span { 
            font-family: 'JetBrains Mono'; 
            font-weight: 800; 
            font-size: 0.85rem; 
            letter-spacing: 1px; 
            color: var(--navy-deep); 
        }

        .nav-links {
            display: flex;
            align-items: center;
            list-style: none; /* Removes bullet points */
            gap: 5px;
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--navy-surface); 
            font-size: 0.65rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            padding: 10px 15px; 
            transition: all 0.2s;
            display: inline-block;
        }
        
        .nav-links a:hover { 
            background: var(--slate-200); 
        }

        /* Styled 'Enroll Now' button to fit the premium theme */
        .btn-nav {
            border: 2px solid var(--navy-deep);
            background: transparent;
            color: var(--navy-deep) !important;
        }
        .btn-nav:hover {
            background: var(--navy-deep) !important;
            color: var(--white) !important;
        }

        /* Solid Hero Section */
        .page-header { 
            padding: 120px 10% 80px; 
            background: var(--navy-deep); 
            color: var(--white); 
            text-align: center;
            border-bottom: 4px solid var(--accent-gold);
        }
        .page-header h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -2px; line-height: 1; }
        .page-header p { font-size: 1.1rem; color: var(--slate-300); max-width: 600px; margin: 0 auto; font-weight: 400; }

        /* Quick Jump Navigation Bar */
        .sponsor-marquee {
            background: var(--white);
            padding: 15px 0;
            border-bottom: 2px solid var(--slate-200);
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }
        .sponsor-marquee a { 
            font-family: 'JetBrains Mono'; 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: var(--navy-deep); 
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--slate-200);
            transition: all 0.2s;
        }
        .sponsor-marquee a:hover {
            background: var(--navy-deep);
            color: var(--white);
            border-color: var(--navy-deep);
        }

        /* Section Styling */
        .section-container { padding: 80px 8%; }
        .category-label { margin-bottom: 40px; border-left: 10px solid var(--navy-deep); padding-left: 20px;}
        .category-label h2 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        
        .sub-bar-label {
            font-size: 0.9rem; font-weight: 800; color: var(--white); text-transform: uppercase;
            letter-spacing: 2px; margin: 50px 0 25px; padding: 12px 20px;
            display: inline-flex; align-items: center; gap: 15px;
            background: var(--navy-deep);
            border-left: 6px solid var(--public-clr);
        }

        .badge { font-family: 'JetBrains Mono'; font-size: 0.6rem; padding: 6px 12px; color: white; font-weight: 700; margin-bottom: 10px; display: inline-block; }

        .dense-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .uni-card {
            background: var(--white);
            border: 2px solid var(--slate-200);
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.2s;
        }
        .uni-card:hover { border-color: var(--navy-deep); }
        .uni-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; color: var(--navy-deep); }
        .uni-card p { font-size: 0.85rem; color: var(--slate-800); margin-bottom: 20px; font-weight: 500; }

        .card-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 2px solid var(--slate-100); }
        .meta-tag { font-family: 'JetBrains Mono'; font-size: 0.65rem; font-weight: 700; color: var(--navy-surface); background: var(--slate-200); padding: 2px 6px; }
        .btn-mini { font-size: 0.65rem; font-weight: 800; text-decoration: none; color: white; padding: 10px 16px; text-transform: uppercase; }

        /* Card Tier Identifiers */
        .public-card { border-left: 6px solid var(--public-clr); }
        .private-card { border-left: 6px solid var(--private-clr); }
        .tvet-card { border-left: 6px solid var(--tvet-clr); }
        .continental-card { border-left: 6px solid var(--continental-clr); }

        footer { background: var(--navy-deep); color: white; padding: 60px 10%; text-align: center; border-top: 10px solid var(--accent-gold); }
        .footer-tag { font-family: 'JetBrains Mono'; font-size: 0.65rem; opacity: 0.6; margin-top: 20px; display: block; letter-spacing: 2px; }
    </style>
</head>
<body>


    <div class="national-bar">
        <div class="bar-black"></div>
        <div class="bar-red"></div>
        <div class="bar-green"></div>
    </div>

    <header>
        <nav>
            <a href="#" class="logo">UEFI <span>GLOBAL</span></a>
            
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="wilsons-initiative.html">The Wilson's Initiative</a>
                <a href="anthoninas-initiative.html">The Anthonina's Initiative</a>
                <a href="opportunities-hub.html">Opportunities</a>
                <a href="#scholarships" class="btn-scholarship">Scholarships</a>
            </div>
        </nav>
    </header>

    <div class="main-wrapper">
        <aside class="sidebar">
            <video autoplay muted loop playsinline class="video-bg">
                <source src="https://assets.mixkit.co/videos/preview/mixkit-modern-university-campus-building-exterior-4330-large.mp4" type="video/mp4">
            </video>
            <div class="overlay-gradient"></div>

            <div class="hero-content">
                <h1>Architecting<br>African<br>Excellence.</h1>
                
                <div class="stats-container">
                    <div class="stat-card">
                        <strong>ISO-27001</strong>
                        <span>Secure Portal</span>
                    </div>
                    <div class="stat-card">
                        <strong>98%</strong>
                        <span>Placement Rate</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="form-side">
            <span class="section-tag">Direct Enrollment</span>
            <div class="form-header">
                <h2>Candidate Portfolio</h2>
            </div>

            <form action="https://formspree.io/f/xnjoplag" method="POST" class="enroll-form">
                
                <div class="input-group full">
                    <label>Full Name</label>
                    <input type="text" name="FullName" placeholder="e.g. Maria Leshau" required>
                </div>

                <div class="input-group full">
                    <label>Professional Email</label>
                    <input type="email" name="Email" placeholder="m.leshau@uefi.org" required>
                </div>

                <div class="input-group">
                    <label>Origin / Residency</label>
                    <select name="Location" required>
                        <option value="" disabled selected>Select Origin</option>
                        <option>Narok</option>
                        <option>Other part of Kenya</option>
                        <option>International</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Academy Track</label>
                    <select name="Track" required>
                        <option>Quant Finance & Algos</option>
                        <option>Applied Artificial Intelligence</option>
                        <option>Anthoninah (Women in Tech)</option>
                        <option>Wilson (Executive Excellence)</option>
                    </select>
                </div>

                <div class="input-group full">
                    <label>Statement of Intent</label>
                    <textarea name="Vision" rows="4" placeholder="Briefly describe your goals..."></textarea>
                </div>

                <input type="hidden" name="_subject" value="GLOBAL ADMISSION: UEFI 2026">
                <button type="submit" class="btn-submit">Submit Formal Application</button>
            </form>
        </main>
    </div>

</body>
</html>
