<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEFI Study Pool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-weight/6.4.0/css/all.min.css">
    <style>
        :root {
            --uefi-blue: #0056B3;
            --uefi-navy: #0A2540;
            --uefi-light-bg: #F4F7FC;
            --radius-pill: 50px;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--uefi-light-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }
        .welcome-container { max-width: 800px; padding: 20px; }
        h1 { color: var(--uefi-navy); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 40px; }
        
        /* The Three Main Capsules */
        .curriculum-capsules {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
        }
        .capsule {
            background: #fff; border: 2px solid transparent;
            padding: 18px 40px; font-size: 1.1rem; font-weight: 700;
            color: var(--uefi-navy); border-radius: var(--radius-pill);
            cursor: pointer; box-shadow: var(--shadow); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none; display: inline-block;
        }
        .capsule:hover {
            transform: translateY(-4px); border-color: var(--uefi-blue);
            color: var(--uefi-blue); box-shadow: 0 15px 35px rgba(0,86,179,0.15);
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Welcome to UEFI Study Pool</h1>
        <p>Select your active curriculum pathway to begin your workspace session.</p>
        
        <div class="curriculum-capsules">
            <a href="cbe.html" class="capsule">Competency Based Education (CBE)</a>
            <a href="ibmyp.html" class="capsule">IB Middle Years Programme (MYP)</a>
            <a href="ibdp.html" class="capsule">IB Diploma Programme (DP)</a>
        </div>
    </div>

</body>
</html>
